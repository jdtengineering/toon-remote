name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: dist/toon-remote.exe
            artifact: toon-remote-windows.exe
          - os: ubuntu-latest
            bin: dist/toon-remote
            artifact: toon-remote-linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow "paramiko<4" requests
      - name: Build binary
        run: pyinstaller --noconfirm --clean --onefile --name toon-remote --collect-submodules paramiko launch.py
      - name: Smoke test
        run: ./${{ matrix.bin }} --selftest
      - name: Stage artifact
        run: cp "${{ matrix.bin }}" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
